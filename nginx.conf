server {
    listen 80;
    server_name _; # Change to your domain if applicable

    # Enable Gzip compression globally
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Cache Control for Next.js Static Assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # 1 year immutable cache
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Custom API Caching - Reviews (1 hour)
    location /api/reviews {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # Microcaching technique
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        
        add_header Cache-Control "public, max-age=3600";
    }

    # Custom API Caching - Search (5 minutes)
    location /api/search {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
        
        add_header Cache-Control "public, max-age=300";
    }

    # Generic configuration for everything else -> Route to Localhost:3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
